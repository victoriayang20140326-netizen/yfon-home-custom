<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Tufted Rug | YFON HOME | Manufacturer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .rainbow-text { background: linear-gradient(90deg,#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        header { position:fixed; top:0; width:100%; z-index:200; background:rgba(10,10,10,.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,.08); }
        .nav-item:hover .mega-menu { display:block; }
        .mega-menu { display:none; position:absolute; top:100%; left:0; background:#fff; border:1px solid #eee; box-shadow:0 8px 30px rgba(0,0,0,.12); z-index:100; min-width:220px; border-radius:8px; padding:8px 0; }
        .thumb-btn.active { border-color: var(--gold); }
        .faq-answer { max-height:0; overflow:hidden; transition:max-height 0.4s ease; }
        .faq-answer.open { max-height:400px; }
        .fade-up { opacity:0; transform:translateY(24px); transition:opacity 0.6s ease,transform 0.6s ease; }
        .fade-up.visible { opacity:1; transform:translateY(0); }
        @keyframes pulse-gold { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.5)} 70%{box-shadow:0 0 0 14px rgba(201,168,76,0)} }
        .pulse-cta { animation:pulse-gold 2.2s infinite; }
        .sticky-cta { position:sticky; top:96px; }
    </style>
</head>
<body>
<header>
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="index.html" class="text-2xl font-bold text-white tracking-tight">YFON <span class="rainbow-text">HOME</span></a>
        <nav class="hidden lg:flex items-center gap-6 text-sm font-medium">
            <a href="index.html" class="text-gray-300 hover:text-white transition">Home</a>
            <div class="nav-item relative">
                <button class="px-3 py-2 flex items-center gap-1 font-semibold text-[#c9a84c]">Products</button>
                <div class="mega-menu"><a href="rugs.html" class="block px-5 py-2 text-sm">Custom Rugs</a><a href="pillows.html" class="block px-5 py-2 text-sm">Custom Pillows</a></div>
            </div>
            <a href="#contact" class="ml-4 px-6 py-2 rounded-full text-black font-bold transition pulse-cta" style="background:var(--gold)">Get a Quote</a>
        </nav>
    </div>
</header>
<div class="pt-20 bg-gray-50 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <nav class="flex items-center gap-2 text-xs text-gray-500">
            <a href="index.html">Home</a><span class="mx-1">/</span><a href="rugs.html">Custom Rugs</a><span class="mx-1">/</span><span class="text-gray-900 font-semibold">Tufted Rug</span>
        </nav>
    </div>
</div>
<section class="py-12 max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div class="lg:col-span-2">
            <div class="w-full mb-4 rounded-2xl overflow-hidden bg-[#f8f8f8]" style="height:480px;">
                <img id="mainImg" src="https://sc02.alicdn.com/kf/Hb5febad75fc9463893ea9afa8ada16df3.jpg" class="w-full h-full object-contain">
            </div>
            <div class="grid grid-cols-4 gap-3 mb-10">
                <button class="thumb-btn active border-2 rounded-xl overflow-hidden h-20" onclick="switchImg(this,'https://sc02.alicdn.com/kf/Hb5febad75fc9463893ea9afa8ada16df3.jpg')"><img src="https://sc02.alicdn.com/kf/Hb5febad75fc9463893ea9afa8ada16df3.jpg" class="w-full h-full object-contain bg-[#f8f8f8]"></button>
                <button class="thumb-btn border-2 border-transparent rounded-xl overflow-hidden h-20" onclick="switchImg(this,'https://sc02.alicdn.com/kf/H8d9db031f0f44188be12591104ff27abJ.jpg')"><img src="https://sc02.alicdn.com/kf/H8d9db031f0f44188be12591104ff27abJ.jpg" class="w-full h-full object-contain bg-[#f8f8f8]"></button>
                <button class="thumb-btn border-2 border-transparent rounded-xl overflow-hidden h-20" onclick="switchImg(this,'https://sc02.alicdn.com/kf/Ab2a44b104e0b4748ac31dc991b20dfa8y.png')"><img src="https://sc02.alicdn.com/kf/Ab2a44b104e0b4748ac31dc991b20dfa8y.png" class="w-full h-full object-contain bg-[#f8f8f8]"></button>
                <button class="thumb-btn border-2 border-transparent rounded-xl overflow-hidden h-20" onclick="switchImg(this,'https://sc02.alicdn.com/kf/H5f5ece528d0b46ea8f2d2d0a435dff81A.jpg')"><img src="https://sc02.alicdn.com/kf/H5f5ece528d0b46ea8f2d2d0a435dff81A.jpg" class="w-full h-full object-contain bg-[#f8f8f8]"></button>
            </div>
            <div class="mb-12 fade-up">
                <h2 class="font-serif text-3xl mb-5">Product Specifications</h2>
                <div class="border rounded-2xl overflow-hidden text-sm">
                    <div class="grid grid-cols-2 border-b"><div class="px-6 py-4 font-semibold bg-gray-50 text-gray-500">Material</div><div class="px-6 py-4">Acrylic / Wool / Nylon</div></div>
                    <div class="grid grid-cols-2 border-b"><div class="px-6 py-4 font-semibold bg-gray-50 text-gray-500">Size</div><div class="px-6 py-4">Fully custom</div></div>
                    <div class="grid grid-cols-2"><div class="px-6 py-4 font-semibold bg-gray-50 text-gray-500">MOQ</div><div class="px-6 py-4">1 piece</div></div>
                </div>
            </div>
            <div class="mb-12 fade-up">
                <h2 class="font-serif text-3xl mb-6">Product Case Scene Show</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="h-52 rounded-xl overflow-hidden bg-[#f8f8f8]"><img src="https://sc02.alicdn.com/kf/Hb5febad75fc9463893ea9afa8ada16df3.jpg" class="w-full h-full object-contain"></div>
                    <div class="h-52 rounded-xl overflow-hidden bg-[#f8f8f8]"><img src="https://sc02.alicdn.com/kf/H8d9db031f0f44188be12591104ff27abJ.jpg" class="w-full h-full object-contain"></div>
                    <div class="h-52 rounded-xl overflow-hidden bg-[#f8f8f8]"><img src="https://sc02.alicdn.com/kf/Ab2a44b104e0b4748ac31dc991b20dfa8y.png" class="w-full h-full object-contain"></div>
                </div>
            </div>
        </div>
        <div class="lg:col-span-1">
            <div class="sticky-cta" id="contact">
                <div class="border rounded-2xl overflow-hidden shadow-lg">
                    <div class="p-6 text-white" style="background:#0a0a0a"><h2 class="font-serif text-2xl">Get a Free Quote</h2></div>
                    <div class="p-6 bg-white">
                        <form action="https://formspree.io/f/xbdvdjdy" method="POST" class="space-y-4">
                            <input name="name" type="text" required placeholder="Name" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                            <input name="email" type="email" required placeholder="Email" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none">
                            <textarea name="message" rows="3" placeholder="Project details..." class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none"></textarea>
                            <p class="text-xs text-gray-400 italic">Tip: Send design via WhatsApp for faster mockup.</p>
                            <button type="submit" class="w-full py-4 rounded-xl text-black font-bold" style="background:var(--gold)">SEND INQUIRY</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script>
    function switchImg(btn,src){document.getElementById('mainImg').src=src;document.querySelectorAll('.thumb-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    const obs=new IntersectionObserver(e=>e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible');}),{threshold:0.1});
    document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
</script>
</body>
</html>
